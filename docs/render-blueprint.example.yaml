# Example only. Do not copy this file to root as render.yaml until the MCP server,
# worker entrypoints, Dockerfile, health endpoints, and migrations exist.
#
# When ready, copy to /render.yaml in an elevated mission and validate against
# Render's Blueprint schema.

services:
  - type: web
    runtime: docker
    name: se-cli-mcp
    repo: https://github.com/StealthEyeLLC/SE-CLI.git
    branch: main
    plan: starter
    region: ohio
    autoDeployTrigger: checksPass
    healthCheckPath: /healthz
    envVars:
      - fromGroup: se-cli-prod
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: se-cli-db
          property: connectionString
      - key: REDIS_HOST
        fromService:
          type: keyvalue
          name: se-cli-kv
          property: host
      - key: REDIS_PORT
        fromService:
          type: keyvalue
          name: se-cli-kv
          property: port
      # Depending on implementation, QUEUE_URL/REDIS_URL may be constructed in app code
      # from REDIS_HOST/REDIS_PORT or set manually as a secret/env var.

  - type: worker
    runtime: docker
    name: se-cli-maintenance
    repo: https://github.com/StealthEyeLLC/SE-CLI.git
    branch: main
    plan: starter
    region: ohio
    autoDeployTrigger: checksPass
    dockerCommand: pnpm --filter @stealtheye/se-cli-mcp maintenance
    envVars:
      - fromGroup: se-cli-prod
      - key: DATABASE_URL
        fromDatabase:
          name: se-cli-db
          property: connectionString
      - key: REDIS_HOST
        fromService:
          type: keyvalue
          name: se-cli-kv
          property: host
      - key: REDIS_PORT
        fromService:
          type: keyvalue
          name: se-cli-kv
          property: port

  - type: keyvalue
    name: se-cli-kv
    region: ohio
    plan: starter
    maxmemoryPolicy: noeviction
    ipAllowList: []

databases:
  - name: se-cli-db
    region: ohio
    plan: basic-256mb
    databaseName: se_cli
    user: se_cli_app

envVarGroups:
  - name: se-cli-prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: SECLI_ENV
        value: production
      - key: SECLI_MCP_PATH
        value: /mcp
      - key: SECLI_LOG_LEVEL
        value: info
      - key: SECLI_ALLOWED_REPOS
        value: StealthEyeLLC/SE-CLI
      - key: SECLI_DEFAULT_BRANCH
        value: main
      - key: SECLI_SESSION_SECRET
        generateValue: true
      - key: SECLI_PACKET_SIGNING_SECRET
        generateValue: true
      - key: SECLI_WORKER_TOKEN_SECRET
        generateValue: true
      - key: SECLI_WEBHOOK_SECRET
        generateValue: true
      - key: SECLI_ENCRYPTION_KEY
        generateValue: true

# Add these manually in the Render dashboard or as non-group service env vars when known:
#
# SECLI_PUBLIC_BASE_URL
# GITHUB_APP_ID
# GITHUB_APP_INSTALLATION_ID
# GITHUB_PRIVATE_KEY_B64
# GITHUB_WEBHOOK_SECRET
# GITHUB_TOKEN only as a temporary fallback, if needed
# RENDER_API_KEY
# RENDER_MCP_SERVICE_ID
# RENDER_MAINTENANCE_SERVICE_ID
# RENDER_POSTGRES_ID
# RENDER_KEY_VALUE_ID
# SECLI_MCP_AUTH_MODE
# SECLI_MCP_AUDIENCE
# SECLI_MCP_ISSUER
# SECLI_MCP_AUTH_SECRET
